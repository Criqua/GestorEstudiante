<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Apuntes</title>
</h:head>
<h:body>

    <h:form>
        <p:outputLabel for="major" value="Choose a car:" />
        <p:selectOneMenu id="cars" value="#{comboBoxBean.selectedCar}">
            <f:selectItem itemLabel="Select One" itemValue="" />
            <f:selectItems value="#{comboBoxBean.cars}" />
        </p:selectOneMenu>

        <p:commandButton value="Submit" action="#{comboBoxBean.submit}" />
    </h:form>

</h:body>
</html>
